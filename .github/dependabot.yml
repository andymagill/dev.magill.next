version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
    groups:
      all-dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: 'typescript'
        versions: ['>=7.0.0', '<7.1.0']
      - dependency-name: 'eslint'
        versions: ['>=10.0.0']
